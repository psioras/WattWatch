services:
  db:
    image: postgres:16-alpine
    container_name: postgres_dev
    restart: always
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=My_Password1!
      - POSTGRES_DB=mydatabase
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
